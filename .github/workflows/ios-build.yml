name: iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - codex/ios-swiftui-native-app
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"

jobs:
  build:
    name: Build SwiftUI app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate --spec project.yml

      - name: Build for simulator
        working-directory: ios
        run: |
          xcodebuild \
            -project SnapCount.xcodeproj \
            -scheme SnapCount \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            SNAPCOUNT_SUPABASE_URL="${{ secrets.IOS_SUPABASE_URL }}" \
            SNAPCOUNT_SUPABASE_ANON_KEY="${{ secrets.IOS_SUPABASE_ANON_KEY }}" \
            build

      - name: Show available destinations on failure help
        if: always()
        working-directory: ios
        run: |
          xcodebuild \
            -project SnapCount.xcodeproj \
            -scheme SnapCount \
            -showdestinations || true
