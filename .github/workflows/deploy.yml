name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "src/domains/**"
      - "tools/ai-validation/expression-planner/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read

concurrency:
  group: supabase-production-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Deploy generate-insights function
        run: |
          supabase functions deploy generate-insights \
            --no-verify-jwt \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy ingest-receipt function
        run: |
          supabase functions deploy ingest-receipt \
            --no-verify-jwt \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify deployed functions
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          supabase functions list --project-ref "$SUPABASE_PROJECT_ID"

          for function_name in generate-insights ingest-receipt; do
            response_file="$RUNNER_TEMP/${function_name}-health.json"
            status_code=$(curl --silent --show-error \
              --output "$response_file" \
              --write-out "%{http_code}" \
              "https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/${function_name}")
            if [ "$status_code" != "405" ]; then
              cat "$response_file"
              echo "Expected ${function_name} to return 405 for GET, received ${status_code}."
              exit 1
            fi
          done
